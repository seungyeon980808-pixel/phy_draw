<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhysicsExamDrawer Web</title>

  <!-- ===== FONTS (IBM Plex Sans KR / Mono) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/inspector.css" />
</head>
<body>
  <!-- ===== APP SHELL (DESIGN §7 three-panel skeleton) ===== -->
  <div class="app">
    <!-- ----- LEFT: tools (V/R now; more shapes land later) ----- -->
    <aside class="panel panel-left">
      <div class="panel-title">도구</div>
      <div class="tool-list" id="tool-list">
        <button class="tool-btn" type="button" data-tool="V" title="선택 (V)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3 L4 15.5 L7.5 12 L9.8 16.5 L11.7 15.6 L9.4 11.2 L14.5 11 Z"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="R" title="사각형 (S)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5.5" width="13" height="9"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="O" title="타원 (O)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="10" cy="10" rx="7" ry="5"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="Y" title="직각삼각형 (Y)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 4 L4.5 15.5 L16 15.5 Z"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="L" title="직선 (L)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4.5" y1="15.5" x2="15.5" y2="4.5"/><circle cx="4.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="4.5" r="1.2" fill="currentColor" stroke="none"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="P" title="다각선 (P)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3.5,14 7.5,6.5 12,12.5 16.5,5.5"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="C" title="곡선 (C)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5,14 C5,4 9,4 10,10 S15,16 16.5,6"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="T" title="텍스트 (T)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="5" x2="16" y2="5"/><line x1="10" y1="5" x2="10" y2="16"/></svg></kbd>
        </button>
        <button class="tool-btn" type="button" data-tool="rotate" title="회전 (R)">
          <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5.5 A6.5 6.5 0 1 0 16.5 10"/><polyline points="14,3 16.5,5.5 14,8"/></svg></kbd>
        </button>
      </div>
    </aside>

    <!-- ----- CENTER: canvas (the only working panel in 1A) ----- -->
    <main class="panel panel-center">
      <div class="canvas-toolbar">
        <span class="hint">
          T = 텍스트 · S/O/Y = 도형 · L/P/C = 선 · R = 회전 · 휠 = 수직팬 · Shift+휠 = 수평팬 · Ctrl+휠 = 줌 · Space+드래그 = 팬
        </span>
        <span id="zoom-readout" class="zoom-readout">zoom 1.00×</span>
      </div>

      <div class="canvas-wrap">
        <!-- viewBox is the single coordinate authority (DESIGN 1-2) -->
        <svg
          id="canvas"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 100 100"
          preserveAspectRatio="xMidYMid meet"
        >
          <!-- render.js paints state.objects into this group -->
          <g id="scene"></g>
        </svg>
      </div>
    </main>

    <!-- ----- RIGHT: inspector ----- -->
    <aside class="panel panel-right">
      <div class="panel-title">인스펙터</div>
      <div id="inspector">
        <div id="inspector-resize"></div>
        <div id="inspector-empty">선택된 오브젝트 없음</div>
        <div id="inspector-content" style="display:none">
          <!-- sections injected by inspector.js -->
        </div>
      </div>
    </aside>
  </div>

  <!-- ===== FOOTER: version + date ===== -->
  <footer class="app-footer">
    PhysicsExamDrawer Web · <strong>v0.11.0</strong> · 2026-06-18
  </footer>

  <!-- ===== MODULES (load order matters: store → state → viewport → render → main) ===== -->
  <!-- ?v= busts the ES-module cache so edits actually load (DESIGN: cache-bust) -->
  <script type="module" src="js/main.js?v=0.11.0"></script>
</body>
</html>

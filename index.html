<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[시범공개] 5E</title>
  <link rel="icon" href="data:," />

  <!-- ===== FONTS (IBM Plex Sans KR / Mono) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/inspector.css" />
</head>
<body>
  <!-- ===== APP SHELL (DESIGN §7 three-panel skeleton) ===== -->
  <div class="app">
    <!-- ----- LEFT: tools (V/R now; more shapes land later) ----- -->
    <aside class="panel panel-left">
      <div class="tool-list" id="tool-list">
        <div class="tool-section">
          <div class="tool-section-header">공통 도구 <span class="toggle-icon">▾</span></div>
          <div class="tool-section-body">
            <button class="tool-btn" type="button" data-tool="V" title="선택 (V)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3 L4 15.5 L7.5 12 L9.8 16.5 L11.7 15.6 L9.4 11.2 L14.5 11 Z"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="R" title="사각형 (S)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5.5" width="13" height="9"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="O" title="타원 (O)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="10" cy="10" rx="7" ry="5"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="Y" title="직각삼각형 (Y)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 4 L4.5 15.5 L16 15.5 Z"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="L" title="직선 (L)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4.5" y1="15.5" x2="15.5" y2="4.5"/><circle cx="4.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="4.5" r="1.2" fill="currentColor" stroke="none"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="P" title="꺾은선 (P)" aria-label="꺾은선 (P)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3.5,14 7.5,6.5 12,12.5 16.5,5.5"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="C" title="곡선 (C)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5,14 C5,4 9,4 10,10 S15,16 16.5,6"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="T" title="텍스트 (T)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="5" x2="16" y2="5"/><line x1="10" y1="5" x2="10" y2="16"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="F" title="자유그리기 (F)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 13 C5 7 7 6 8.5 9.5 S11.5 15.5 13.5 11 C14.5 8.8 16 9 16.5 11"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="rotate" title="회전 (R)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5.5 A6.5 6.5 0 1 0 16.5 10"/><polyline points="14,3 16.5,5.5 14,8"/></svg></kbd>
            </button>
          </div>
        </div>
        <!-- ===== SYMBOL LIBRARY: generated from templates.js TEMPLATES =====
             initTemplates() fills this with one collapsible .tool-section per
             category (공통 / 회로 / 광학 / 역학). Each generated button carries a
             UNIQUE data-symbol="<symbolId>". Do NOT hardcode symbol buttons here. -->
        <div id="symbol-sections"></div>
        <div class="tool-section">
          <div class="tool-section-header">고급 기능 <span class="toggle-icon">▾</span></div>
          <div class="tool-section-body tool-section-body-wide">
            <button id="image-objectify-open" class="advanced-tool-btn" type="button">이미지 객체화</button>
            <button id="image-import-mock-open" class="advanced-tool-btn" type="button">이미지 → 객체 (목업)</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ----- CENTER: canvas (the only working panel in 1A) ----- -->
    <main class="panel panel-center">
      <div class="canvas-toolbar">
        <div class="app-brand" title="5E (sciEnceEducationalExamEasyEditor)"><span class="beta-label">[시범공개]</span>5E</div>
        <!-- Undo / Redo (icon-only; sit immediately left of 파일) -->
        <button id="undo-btn" class="topbar-btn icon-btn" type="button"
                title="되돌리기 (Ctrl+Z)" aria-label="되돌리기" disabled>↶</button>
        <button id="redo-btn" class="topbar-btn icon-btn" type="button"
                title="다시 실행 (Ctrl+Y / Ctrl+Shift+Z)" aria-label="다시 실행" disabled>↷</button>
        <!-- 파일 dropdown: project I/O (JSON) + image export (PNG/SVG) -->
        <div class="file-menu">
          <button id="file-menu-btn" class="topbar-btn" type="button"
                  aria-haspopup="true" aria-expanded="false" title="파일">파일 ▾</button>
          <div id="file-menu-list" class="file-menu-list" role="menu" hidden>
            <button id="project-save" class="file-menu-item" type="button" role="menuitem"
                    data-desc="현재 작업을 나중에 다시 편집할 수 있는 프로젝트 파일로 저장합니다.">프로젝트 저장</button>
            <button id="project-open" class="file-menu-item" type="button" role="menuitem"
                    data-desc="저장해 둔 프로젝트 파일을 열어 이어서 편집합니다.">프로젝트 불러오기</button>
            <button id="image-import" class="file-menu-item" type="button" role="menuitem"
                    data-desc="JPG, PNG 등의 이미지 파일을 캔버스에 불러와 배치합니다.">이미지 불러오기</button>
            <button id="image-export" class="file-menu-item" type="button" role="menuitem"
                    data-desc="현재 그림을 PNG 또는 JPG 이미지 파일로 저장합니다.">이미지로 내보내기</button>
            <div id="file-menu-desc" class="file-menu-desc">파일 작업을 선택하세요.</div>
          </div>
        </div>
        <!-- 설정 dropdown: 기본값 설정 (localStorage) + 단축키 설정 (준비 중) -->
        <div class="file-menu">
          <button id="settings-menu-btn" class="topbar-btn" type="button" aria-haspopup="true" aria-expanded="false" title="설정">설정 ▾</button>
          <div id="settings-menu-list" class="file-menu-list" role="menu" hidden>
            <button id="open-defaults" class="file-menu-item" type="button" role="menuitem">기본값 설정</button>
            <button id="open-shortcuts" class="file-menu-item" type="button" role="menuitem" disabled title="준비 중">단축키 설정</button>
          </div>
        </div>
        <span id="zoom-readout" class="zoom-readout">zoom 1.00×</span>
        <button id="fullscreen-toggle" class="topbar-btn fullscreen-toggle" type="button"
                title="전체화면 (Alt+Enter)" aria-label="전체화면" aria-pressed="false">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M3.5 7V3.5H7M13 3.5h3.5V7M16.5 13v3.5H13M7 16.5H3.5V13" />
          </svg>
        </button>
        <button id="theme-toggle" class="topbar-btn icon-btn theme-toggle" type="button" title="흑백 모드 끄기" aria-label="흑백 모드 끄기" aria-pressed="true">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5" />
            <path d="M10 3.5a6.5 6.5 0 0 1 0 13z" fill="currentColor" />
          </svg>
        </button>
      </div>

      <div class="canvas-wrap">
        <!-- ruler-container: CSS grid — corner | h-ruler / v-ruler | canvas -->
        <div class="ruler-container" id="ruler-container">
          <div class="ruler-corner"></div>
          <canvas id="ruler-h" class="ruler ruler-h"></canvas>
          <canvas id="ruler-v" class="ruler ruler-v"></canvas>
          <!-- viewBox is the single coordinate authority (DESIGN 1-2) -->
          <svg
            id="canvas"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 100 100"
            preserveAspectRatio="xMidYMid meet"
          >
            <!-- render.js paints state.objects into this group -->
            <g id="scene"></g>
          </svg>
        </div>
      </div>

      <!-- ===== CANVAS BOTTOM BAR: grid controls ===== -->
      <div class="canvas-bottom-bar">
        <label>
          <input type="checkbox" id="grid-toggle" />
          격자
        </label>
        <label>
          진하기
          <input type="range" id="grid-opacity" min="1" max="10" value="3" />
        </label>
        <label>
          간격
          <input type="number" id="grid-interval" min="5" max="50" step="5" value="10" />
          mm
        </label>
        <button id="center-view-btn" title="아트보드를 화면 중앙으로">⌖</button>
        <label>
          <input type="checkbox" id="ruler-toggle" checked />
          눈금자
        </label>
      </div>
    </main>

    <!-- ----- RIGHT: inspector ----- -->
    <aside class="panel panel-right">
      <div id="inspector-resize"></div>
      <div id="inspector">
        <div id="inspector-empty">선택된 오브젝트 없음</div>
        <div id="inspector-content" style="display:none">
          <!-- sections injected by inspector.js -->
        </div>
      </div>
    </aside>
  </div>

  <div class="developer-credit" aria-hidden="true">
    Developed by 박승연 | SMOE
  </div>

  <!-- ===== FOOTER: version + date ===== -->
  <footer class="app-footer">
    <span class="beta-label">[시범공개]</span> 5E (sciEnceEducationalExamEasyEditor) · 과학 교사를 위한 시험문제 그림 제작 도구 · <strong>v0.36.5</strong> · 2026-07-01
  </footer>

  <!-- ===== MODULES (load order matters: store → state → viewport → render → main) ===== -->
  <!-- ?v= busts the ES-module cache so edits actually load (DESIGN: cache-bust) -->
  <script type="module" src="js/main.js?v=0.36.5"></script>
</body>
</html>
